  <text x="80" y="600" font-family="Arial" font-size="22" fill="#475569" font-weight="500">siptruth.com</text>
  <text x="1120" y="600" font-family="Arial" font-size="18" fill="#475569" text-anchor="end">Free. No login. No nonsense.</text>
