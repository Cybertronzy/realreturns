  <rect x="316" y="490" width="240" height="44" rx="8" fill="#10B98115" stroke="#10B98140" stroke-width="1"/>
  <text x="436" y="518" font-family="Arial" font-size="15" fill="#10B981" text-anchor="middle" font-weight="600">Inflation Adjusted</text>
  <rect x="572" y="490" width="220" height="44" rx="8" fill="#10B98115" stroke="#10B98140" stroke-width="1"/>
  <text x="682" y="518" font-family="Arial" font-size="15" fill="#10B981" text-anchor="middle" font-weight="600">Step-up SIP</text>
  <!-- Right side numbers panel -->
  <rect x="820" y="130" width="310" height="330" rx="20" fill="white" opacity="0.05" stroke="white" stroke-width="1" stroke-opacity="0.1"/>
  <text x="975" y="185" font-family="Arial" font-size="13" fill="#94A3B8" text-anchor="middle" font-weight="600" letter-spacing="1">NOMINAL CORPUS</text>
  <text x="975" y="235" font-family="Georgia" font-size="42" fill="#10B981" text-anchor="middle" font-weight="bold">48.11 L</text>
  <line x1="850" y1="260" x2="1100" y2="260" stroke="#334155" stroke-width="1"/>
  <text x="975" y="300" font-family="Arial" font-size="13" fill="#94A3B8" text-anchor="middle" font-weight="600" letter-spacing="1">AFTER LTCG TAX</text>
  <text x="975" y="348" font-family="Georgia" font-size="42" fill="#EF4444" text-anchor="middle" font-weight="bold">46.69 L</text>
  <line x1="850" y1="372" x2="1100" y2="372" stroke="#334155" stroke-width="1"/>
  <text x="975" y="410" font-family="Arial" font-size="13" fill="#94A3B8" text-anchor="middle" font-weight="600" letter-spacing="1">REAL VALUE TODAY</text>
  <text x="975" y="455" font-family="Georgia" font-size="42" fill="#F59E0B" text-anchor="middle" font-weight="bold">19.48 L</text>
