  <text x="80" y="200" font-family="Georgia" font-size="62" fill="white" font-weight="bold">See your</text>
  <text x="80" y="275" font-family="Georgia" font-size="62" fill="#10B981" font-weight="bold">real returns.</text>
  <text x="80" y="350" font-family="Georgia" font-size="62" fill="white" font-weight="bold">Not the Instagram</text>
  <text x="80" y="425" font-family="Georgia" font-size="62" fill="white" font-weight="bold">version.</text>
  <!-- Features row -->
  <rect x="80" y="490" width="220" height="44" rx="8" fill="#10B98115" stroke="#10B98140" stroke-width="1"/>
